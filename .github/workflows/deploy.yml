name: Deploy to Cloudflare

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Cancel an in-progress deploy if a newer commit is pushed. Terraform here is
# stateless/idempotent and Pages deploys are re-runnable, so interrupting is safe.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what changed and resolve the Cloudflare account id once, so the two
  # deploy jobs below can run in parallel without duplicating this work.
  changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      page: ${{ steps.filter.outputs.page }}
      account_id: ${{ steps.fetch_account_id.outputs.account_id }}
    steps:
      - uses: actions/checkout@v5

      # Shared files (types, uptime.config.ts, and this workflow) intentionally
      # appear in both filters so they deploy both sides.
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'types/**'
              - 'uptime.config.ts'
              - 'deploy.tf'
              - 'init.sql'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'
            page:
              - 'pages/**'
              - 'components/**'
              - 'util/**'
              - 'styles/**'
              - 'public/**'
              - 'middleware.ts'
              - 'next.config.js'
              - 'tsconfig.json'
              - 'package.json'
              - 'package-lock.json'
              - 'types/**'
              - 'uptime.config.ts'
              - '.github/workflows/deploy.yml'

      # Automatically get an account id via the API Token
      # if secrets.CLOUDFLARE_ACCOUNT_ID is not set.
      - name: Fetch Account ID
        id: fetch_account_id
        run: |
          if [[ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
            echo "Using provided CLOUDFLARE_ACCOUNT_ID from secrets."
          else
            ACCOUNT_ID=$(curl -X GET "https://api.cloudflare.com/client/v4/accounts" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type:application/json" | jq ".result[0].id" -r)
            if [[ "$ACCOUNT_ID" == "null" ]]; then
              echo "Failed to get an account id, please make sure you have set up CLOUDFLARE_API_TOKEN correctly!"
              exit 1
            fi
          fi
          echo 'account_id='$ACCOUNT_ID >> $GITHUB_OUTPUT

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ---------------------------------------------------------------------
  # Worker deploy (only when worker-relevant files change)
  # ---------------------------------------------------------------------
  deploy-worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.4

      - name: Install worker packages
        run: |
          cd worker
          npm install

      - name: Build worker
        run: |
          cd worker
          npx wrangler deploy src/index.ts --outdir dist --dry-run

      # The D1 database is created once (manually, see README) and its id is
      # stored as the CLOUDFLARE_D1_ID secret. Tables are created/repaired by the
      # worker's ensureSchema() on every scheduled tick, so no CI init step is
      # needed. D1_ID is only consumed by the `terraform import` line below.

      - name: Deploy using Terraform
        # As we don't save terraform state somewhere, we need to import the existing resources
        run: |
          terraform init

          DO_RESP=$(curl "https://api.cloudflare.com/client/v4/accounts/$TF_VAR_CLOUDFLARE_ACCOUNT_ID/workers/durable_objects/namespaces?per_page=1000" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          if echo "$DO_RESP" | jq -e '.result[] | select(.script == "uptimeflare_worker" and .class == "RemoteChecker")' > /dev/null; then
            echo "Existing Durable Object namespace found for uptimeflare_worker RemoteChecker. No migration needed."
          else
            echo "No existing Durable Object namespace found for uptimeflare_worker RemoteChecker. Need migration."
            export TF_VAR_enable_do_migration=true
          fi

          echo "Try importing existing resources..."
          terraform import cloudflare_d1_database.uptimeflare_d1 "$TF_VAR_CLOUDFLARE_ACCOUNT_ID/$D1_ID"
          terraform import cloudflare_workers_script.uptimeflare_worker "$TF_VAR_CLOUDFLARE_ACCOUNT_ID/uptimeflare_worker" || echo "WARNING: Worker script import failed, continuing..."
          terraform import cloudflare_workers_cron_trigger.uptimeflare_worker_cron "$TF_VAR_CLOUDFLARE_ACCOUNT_ID/uptimeflare_worker" || echo "WARNING: Cron trigger import failed, continuing..."
          terraform import cloudflare_pages_project.uptimeflare "$TF_VAR_CLOUDFLARE_ACCOUNT_ID/uptimeflare" || echo "WARNING: Pages project import failed, continuing..."

          terraform apply -auto-approve -input=false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_CLOUDFLARE_ACCOUNT_ID: ${{ needs.changes.outputs.account_id }}
          D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}

  # ---------------------------------------------------------------------
  # Page deploy (only when page-relevant files change)
  # ---------------------------------------------------------------------
  deploy-page:
    needs: changes
    if: needs.changes.outputs.page == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Cache the installed node_modules, not just the npm download cache, so an
      # unchanged lockfile skips the resolve+link entirely instead of rebuilding
      # the tree every run.
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-node24-${{ hashFiles('package-lock.json') }}

      - name: Install root packages
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build page
        run: |
          npx @cloudflare/next-on-pages

      # Currently Terraform Cloudflare provider doesn't support direct upload, use wrangler to upload instead.
      - name: Upload pages
        run: |
          npx wrangler pages deploy .vercel/output/static --project-name uptimeflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ needs.changes.outputs.account_id }}
